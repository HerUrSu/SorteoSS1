<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sorteo</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cpath d='M32 32 L32 0 A32 32 0 0 1 64 32 Z' fill='%2341c3d2'/%3E%3Cpath d='M32 32 L64 32 A32 32 0 0 1 32 64 Z' fill='%23f8d34c'/%3E%3Cpath d='M32 32 L32 64 A32 32 0 0 1 0 32 Z' fill='%23EA1F27'/%3E%3Cpath d='M32 32 L0 32 A32 32 0 0 1 32 0 Z' fill='%23b15291'/%3E%3Ccircle cx='32' cy='32' r='8' fill='%23ffffff'/%3E%3Ccircle cx='32' cy='32' r='6' fill='%23EA1F27'/%3E%3C/svg%3E">
  <script>
    try {
      const c = JSON.parse(localStorage.getItem('ruleta_config') || '{}');
      if (c.bgSorteo) {
        const style = document.createElement('style');
        style.innerHTML = `body { background-image: url(${c.bgSorteo}) !important; }`;
        document.documentElement.appendChild(style);
      }
    } catch(e) {}
  </script>
  <style>
    @font-face {
      font-family: 'Santander Micro Text';
      src: url('SantanderMicroText.otf') format('opentype');
    }

    @font-face {
      font-family: 'Santander Condensed';
      src: url('SantanderCondensed-Bold.otf') format('opentype');
      font-weight: bold;
    }

    :root {
      --bg: #0b1022;
      --stroke: rgba(255, 255, 255, 0.12);
      --text: #e9eefb;
      --accent: #EA1F27;
      /* Santander Red */
      --accent-hover: #C90017;
      --gold: #EA1F27;
      /* Changed to red as requested */
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: #0b1022;
      background-image: url("Verano2.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      color: var(--text);
      font-family: "Santander Micro Text", "Segoe UI", system-ui, sans-serif;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 80px 20px 40px;
    }

    /* Navbar exact match */
    .navbar {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 10px;
      background: rgba(10, 14, 30, 0.6);
      padding: 8px;
      border-radius: 99px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
      z-index: 100;
    }

    .nav-item {
      color: var(--text);
      text-decoration: none;
      font-family: "Santander Micro Text", sans-serif;
      font-weight: 700;
      font-size: 18px;
      padding: 10px 24px;
      border-radius: 99px;
      transition: all 0.2s ease;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    .nav-item:hover {
      opacity: 1;
      background: rgba(255, 255, 255, 0.08);
    }

    .nav-item.active {
      opacity: 1;
      background: var(--gold);
      color: #ffffff;
      box-shadow: 0 4px 15px rgba(226, 0, 26, 0.4);
    }

    .logo-container {
      position: absolute;
      top: 20px;
      right: 25px;
      max-width: 170px;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
      animation: fadeInDown 1s ease-out forwards;
    }

    /* Main Container */
    .wrap {
      width: min(1000px, 100%);
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Glass Cards */
    .glass-panel {
      background: rgba(10, 14, 30, 0.15); /* Sleek translucent tint matching Ruleta */
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 26px 90px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      transition: transform 0.3s ease;
    }

    .glass-panel:hover {
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Top Grid: Carga & Configuración */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media(max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }

    h1,
    h2,
    h3 {
      font-family: "Santander Condensed", sans-serif;
      margin: 0;
      font-weight: 800;
    }

    .page-title {
      font-size: 48px;
      text-align: center;
      margin-bottom: 30px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ea1f27;
      text-shadow: 0 4px 15px rgba(255, 255, 255, 0.4);
      animation: fadeInDown 1s ease-out;
    }

    .section-title {
      font-size: 26px;
      color: #ffffff;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--stroke);
      padding-bottom: 10px;
    }

    /* Custom File Input */
    .file-upload-wrapper {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .file-drop-area {
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 14px;
      padding: 15px 20px;
      text-align: center;
      background: rgba(255, 255, 255, 0.03);
      transition: all 0.2s ease;
      position: relative;
      cursor: pointer;
    }

    .file-drop-area:hover,
    .file-drop-area.dragover {
      background: rgba(255, 255, 255, 0.08);
      border-color: var(--gold);
    }

    .file-drop-area span {
      display: block;
      font-size: 16px;
      color: #ccc;
      margin-top: 10px;
    }

    input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .status-text {
      font-size: 15px;
      color: #94a3b8;
      background: rgba(0, 0, 0, 0.2);
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }

    .success-text {
      color: #86dbff;
      font-weight: bold;
    }

    /* Number & Config Inputs */
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .field-group label {
      font-size: 15px;
      color: #e2e8f0;
    }

    input[type="number"] {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      padding: 14px;
      border-radius: 12px;
      font-size: 18px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.12);
    }

    /* Custom Radio Buttons */
    .radio-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .custom-radio {
      display: flex;
      align-items: center;
      cursor: pointer;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .custom-radio:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .custom-radio input {
      display: none;
    }

    .custom-radio .checkmark {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      margin-right: 12px;
      position: relative;
      transition: all 0.2s ease;
    }

    .custom-radio input:checked+.checkmark {
      border-color: var(--gold);
      background: var(--gold);
    }

    .custom-radio input:checked~span {
      color: #ffffff;
      font-weight: bold;
    }

    /* Action Buttons */
    .primary-btn {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 14px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: "Santander Condensed", sans-serif;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(226, 0, 26, 0.4);
    }

    .primary-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 12px 25px rgba(226, 0, 26, 0.5);
    }

    .primary-btn:active {
      box-shadow: 0 4px 10px rgba(226, 0, 26, 0.4);
      opacity: 0.9;
    }

    .primary-btn:disabled {
      background: #555;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
      opacity: 0.6;
    }

    /* Winner Board */
    .winner-board {
      margin-top: 10px;
      background: rgba(226, 0, 26, 0.15);
      /* Soft red tint */
      border: 1px solid rgba(226, 0, 26, 0.5);
    }

    .winner-board .section-title {
      border-bottom-color: rgba(226, 0, 26, 0.3);
      color: #fff;
    }

    #lista_ganadores {
      list-style-type: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .winner-item {
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      color: white;
      padding: 18px 24px;
      border-radius: 14px;
      font-size: 24px;
      font-family: "Santander Condensed", sans-serif;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 15px;
      box-shadow: 0 10px 25px rgba(226, 0, 26, 0.3);
      animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      opacity: 0;
      transform: scale(0.8);
    }

    .winner-index {
      background: rgba(0, 0, 0, 0.2);
      color: #ffffff;
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 22px;
    }

    @keyframes popIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .grid-2 .glass-panel:nth-child(1) {
      animation: fadeInDown 1s ease-out 0.1s both;
    }

    .grid-2 .glass-panel:nth-child(2) {
      animation: fadeInDown 1s ease-out 0.3s both;
    }

    .btn-container {
      animation: fadeInDown 1s ease-out 0.5s both;
    }

    /* Error Shake */
    .shake {
      animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
    }

    @keyframes shake {

      10%,
      90% {
        transform: translate3d(-1px, 0, 0);
      }

      20%,
      80% {
        transform: translate3d(2px, 0, 0);
      }

      30%,
      50%,
      70% {
        transform: translate3d(-4px, 0, 0);
      }

      40%,
      60% {
        transform: translate3d(4px, 0, 0);
      }
    }
  </style>
</head>

  <!-- Particle Canvas -->
  <canvas id="particleCanvas" class="particle-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></canvas>

  <!-- Floating Nav and Logo -->
  <nav class="navbar">
    <a href="index.html" class="nav-item">Ruleta</a>
    <a href="sorteo.html" class="nav-item active">Sorteo</a>
  </nav>

  <!-- Content Wrap -->
  <div class="wrap">

    <div class="grid-2">
      <!-- Sección 1: Carga de Datos -->
      <div class="glass-panel">
        <h2 class="section-title">1. Base de Participantes</h2>

        <div
          style="background: rgba(255,255,255,0.05); border: 1px solid var(--stroke); padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; font-size: 13px;">
          <strong style="color: #ffffff;">Formato requerido en Excel (.xlsx):</strong>
          <p style="margin: 4px 0 6px 0; opacity: 0.9; font-size: 12px;">Asegúrate de tener un encabezado exacto en la
            Fila 1:</p>
          <table
            style="width: 100%; border-collapse: collapse; text-align: left; background: rgba(0,0,0,0.2); border-radius: 6px; overflow: hidden;">
            <tr style="background: rgba(255,255,255,0.1);">
              <th style="padding: 4px 8px; font-family: 'Santander Condensed', sans-serif; font-size: 15px;">Nombre</th>
              <th style="padding: 4px 8px; font-family: 'Santander Condensed', sans-serif; font-size: 15px;">Cupones
              </th>
            </tr>
            <tr>
              <td style="padding: 4px 8px; opacity: 0.85;">Juan Pérez</td>
              <td style="padding: 4px 8px; opacity: 0.85;">3</td>
            </tr>
          </table>
        </div>

        <div class="file-upload-wrapper">
          <div class="file-drop-area" id="dropArea">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span id="fileLabel">Arrastra el archivo Excel aquí<br>o haz clic para explorar</span>
            <input type="file" id="archivo_excel" accept=".xlsx, .xls">
          </div>

          <button class="primary-btn" id="btnExtraer"
            style="margin-top: 10px; background: rgba(255,255,255,0.1); color: #fff; box-shadow: none; font-size: 20px;">
            Extraer Datos
          </button>

          <div id="resultado" class="status-text">
            Esperando archivo (.xlsx o .xls)
          </div>
        </div>
      </div>

      <!-- Sección 2: Configuración -->
      <div class="glass-panel">
        <h2 class="section-title">2. Configuración</h2>

        <div class="field-group">
          <label for="cantidad_ganadores">Cantidad de Ganadores:</label>
          <input type="number" id="cantidad_ganadores" value="1" min="1">
        </div>

        <div class="field-group" style="margin-top:20px;">
          <label>Modalidad de repetición:</label>
          <div class="radio-container">
            <label class="custom-radio">
              <input type="radio" name="sorteo_option" id="sin_reposicion" value="sin_reposicion" checked>
              <div class="checkmark"></div>
              <span>Sin Reposición (Ganador se elimina del pozo)</span>
            </label>
            <label class="custom-radio">
              <input type="radio" name="sorteo_option" id="con_reposicion" value="con_reposicion">
              <div class="checkmark"></div>
              <span>Con Reposición (Puede ganar múltiples veces)</span>
            </label>
          </div>
        </div>

      </div>
    </div>

    <!-- Sección 3: Big Action y Ganadores -->
    <div class="btn-container" style="text-align: center; margin: 10px 0;">
      <button class="primary-btn" id="btnSortear"
        style="font-size: 32px; padding: 20px; font-family: 'Santander Condensed', sans-serif;">
        REALIZAR SORTEO
      </button>
    </div>

    <div class="glass-panel winner-board" id="winnerBoard" style="display: none;">
      <h2 class="section-title"
        style="text-align: center; border: none; font-size: 36px; text-shadow: 0 2px 8px rgba(0,0,0,0.5);"> GANADORES
      </h2>
      <ul id="lista_ganadores"></ul>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.4/xlsx.full.min.js"></script>
  <script>
    // Variables de estado
    let participantes = [];

    // Referencias del DOM
    const archivoExcel = document.getElementById('archivo_excel');
    const fileLabel = document.getElementById('fileLabel');
    const dropArea = document.getElementById('dropArea');
    const btnExtraer = document.getElementById('btnExtraer');
    const resultadoMsg = document.getElementById('resultado');
    const btnSortear = document.getElementById('btnSortear');
    const winnerBoard = document.getElementById('winnerBoard');
    const listaGanadores = document.getElementById('lista_ganadores');

    // UI File Handling
    archivoExcel.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        fileLabel.innerHTML = `<span style="color:#ffffff; font-weight:bold;">${file.name}</span>`;
      }
    });

    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropArea.addEventListener(eventName, highlight, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropArea.addEventListener(eventName, unhighlight, false);
    });

    function highlight(e) { dropArea.classList.add('dragover'); }
    function unhighlight(e) { dropArea.classList.remove('dragover'); }

    dropArea.addEventListener('drop', handleDrop, false);

    function handleDrop(e) {
      const dt = e.dataTransfer;
      const files = dt.files;
      archivoExcel.files = files; // Assign to input

      if (files[0]) {
        fileLabel.innerHTML = `<span style="color:#ffffff; font-weight:bold;">${files[0].name}</span>`;
      }
    }

    // Extraction Logic
    btnExtraer.addEventListener('click', () => {
      const file = archivoExcel.files[0];

      if (!file) {
        resultadoMsg.textContent = '❌ Por favor, inserta un archivo Excel primero.';
        resultadoMsg.classList.add('shake');
        setTimeout(() => resultadoMsg.classList.remove('shake'), 400);
        return;
      }

      resultadoMsg.textContent = 'Procesando archivo... ⏳';

      const reader = new FileReader();
      reader.onload = function (e) {
        try {
          const data = e.target.result;
          const workbook = XLSX.read(data, { type: 'binary' });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];

          participantes = [];
          const rows = XLSX.utils.sheet_to_json(sheet);

          let totalNombres = 0;
          let totalCupones = 0;

          rows.forEach(row => {
            const nombre = row['Nombre'];
            const cupones = parseInt(row['Cupones']);
            if (!isNaN(cupones) && nombre) {
              totalNombres++;
              totalCupones += cupones;
              for (let i = 0; i < cupones; i++) {
                participantes.push(nombre);
              }
            }
          });

          resultadoMsg.innerHTML = `<span class="success-text"> ¡Base cargada con éxito!</span>`;

          winnerBoard.style.display = 'none';
          listaGanadores.innerHTML = '';

        } catch (error) {
          console.error(error);
          resultadoMsg.textContent = 'Error al leer el archivo. Verifica el formato.';
        }
      };

      reader.readAsBinaryString(file);
    });

    // Confetti System
    const palette = ["#EA1F27", "#f34047", "#f8d34c", "#41c3d2", "#b15291"];
    const particleCanvas = document.getElementById('particleCanvas');
    const particleCtx = particleCanvas.getContext('2d');
    let particles = [];

    function resizeParticleCanvas() {
      particleCanvas.width = window.innerWidth;
      particleCanvas.height = window.innerHeight;
    }
    resizeParticleCanvas();
    window.addEventListener('resize', resizeParticleCanvas);

    class Particle {
      constructor() {
        this.x = Math.random() * window.innerWidth;
        this.y = Math.random() < 0.8 ? -20 : Math.random() * window.innerHeight * 0.3;
        this.vx = (Math.random() - 0.5) * 12;
        this.vy = Math.random() * 8 - 2;
        this.size = Math.random() * 8 + 1;
        this.color = palette[Math.floor(Math.random() * palette.length)];
        this.life = 1;
        this.decay = Math.random() * 0.006 + 0.001;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.4;
        this.shape = Math.random();
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += Math.random() * 0.2;
        this.vx *= (0.95 + Math.random() * 0.05);
        this.vy *= (0.95 + Math.random() * 0.05);
        this.life -= this.decay;
        this.rotation += this.rotationSpeed;
        if (Math.random() < 0.02) {
          this.vx += (Math.random() - 0.5) * 4;
          this.vy += (Math.random() - 0.5) * 4;
        }
      }
      draw() {
        particleCtx.save();
        particleCtx.globalAlpha = this.life;
        particleCtx.fillStyle = this.color;
        particleCtx.translate(this.x, this.y);
        particleCtx.rotate(this.rotation);
        if (this.shape < 0.25) {
          particleCtx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size * (0.5 + Math.random()));
        } else if (this.shape < 0.5) {
          particleCtx.beginPath();
          particleCtx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
          particleCtx.fill();
        } else if (this.shape < 0.75) {
          particleCtx.beginPath();
          particleCtx.moveTo(0, -this.size / 2);
          particleCtx.lineTo(-this.size / 2, this.size / 2);
          particleCtx.lineTo(this.size / 2, this.size / 2);
          particleCtx.closePath();
          particleCtx.fill();
        } else {
          particleCtx.strokeStyle = this.color;
          particleCtx.lineWidth = this.size / 4;
          particleCtx.beginPath();
          particleCtx.moveTo(-this.size, 0);
          particleCtx.lineTo(this.size, 0);
          particleCtx.stroke();
        }
        particleCtx.restore();
      }
    }

    function createConfetti() {
      const count = Math.floor(Math.random() * 80) + 120;
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
      const waves = Math.floor(Math.random() * 4) + 2;
      for (let w = 0; w < waves; w++) {
        setTimeout(() => {
          const waveCount = Math.floor(Math.random() * 40) + 20;
          for (let i = 0; i < waveCount; i++) {
            particles.push(new Particle());
          }
        }, Math.random() * 1000 + 200);
      }
    }

    function updateParticles() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update();
        if (p.life <= 0 || p.y > window.innerHeight + 200) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      particles.forEach(p => p.draw());
    }

    function animateCelebration() {
      function frame() {
        particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
        updateParticles();
        drawParticles();
        if (particles.length > 0) {
          requestAnimationFrame(frame);
        }
      }
      frame();
    }

    // Sweepstakes Function
    btnSortear.addEventListener('click', () => {
      const cantidadGanadores = parseInt(document.getElementById('cantidad_ganadores').value);
      const conReposicion = document.getElementById('con_reposicion').checked;

      if (cantidadGanadores <= 0 || isNaN(cantidadGanadores)) {
        alert('Por favor, ingresa una cantidad válida de ganadores a sortear.');
        return;
      }

      if (participantes.length === 0) {
        alert('Debes extraer participaciones antes de realizar el sorteo.');
        document.querySelector('.file-drop-area').classList.add('shake');
        setTimeout(() => document.querySelector('.file-drop-area').classList.remove('shake'), 400);
        return;
      }

      let pool = [...participantes];

      if (cantidadGanadores > pool.length && !conReposicion) {
        alert('No hay suficientes participantes en el pozo para esa cantidad sin reposición.');
        return;
      }

      // Hide board and clear first to re-trigger animations if sorted multiple times
      winnerBoard.style.display = 'none';
      listaGanadores.innerHTML = '';
      void winnerBoard.offsetWidth;

      const ganadores = [];
      for (let i = 0; i < cantidadGanadores; i++) {
        if (pool.length === 0) break;
        const index = Math.floor(Math.random() * pool.length);
        ganadores.push(pool[index]);
        if (!conReposicion) {
          const ganador = pool[index];
          // Remove all instances of this specific winner name
          pool = pool.filter(p => p !== ganador);
        }
      }

      // Guardar el nuevo pozo sin los ganadores para futuros sorteos
      if (!conReposicion) {
        participantes = [...pool];
      }

      // Iniciar cuenta regresiva
      btnSortear.disabled = true;
      let countdown = 3;
      btnSortear.innerHTML = `⏳ SORTEANDO EN... ${countdown}`;

      const intervalId = setInterval(() => {
        countdown--;
        if (countdown > 0) {
          btnSortear.innerHTML = `⏳ SORTEANDO EN... ${countdown}`;
        } else {
          clearInterval(intervalId);
          btnSortear.innerHTML = "REALIZAR SORTEO";
          btnSortear.disabled = false;
          
          // Display results with staggered animations
          winnerBoard.style.display = 'block';

          ganadores.forEach((ganador, index) => {
            const li = document.createElement('li');
            li.className = 'winner-item';
            li.style.animationDelay = `${index * 0.15}s`;

            li.innerHTML = `
              <div class="winner-index">${index + 1}</div>
              <div>${ganador}</div>
            `;
            listaGanadores.appendChild(li);
          });

          // Auto-scroll to winners and throw confetti
          setTimeout(() => {
            winnerBoard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            createConfetti();
            animateCelebration();
          }, 100);
        }
      }, 1000);
    });

  </script>
  <script src="admin.js"></script>
</body>
